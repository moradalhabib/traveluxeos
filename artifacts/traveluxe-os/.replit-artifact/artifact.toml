kind = "web"
previewPath = "/"
title = "Traveluxe OS"
version = "1.0.0"
id = "artifacts/traveluxe-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18368

[services.development]
run = "pnpm --filter @workspace/traveluxe-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traveluxe-os", "run", "build" ]
publicDir = "artifacts/traveluxe-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18368"
BASE_PATH = "/"
